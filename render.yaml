services:
  - type: web
    name: bonasov1-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /admin/login/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: bonasov1-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://bonasov1.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://bonasov1.onrender.com
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: USE_X_FORWARDED_PROTO
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: SECURE_HSTS_PRELOAD
        value: "True"
      - key: DATABASE_URL
        sync: false
